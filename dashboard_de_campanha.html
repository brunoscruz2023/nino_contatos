<!DOCTYPE html>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            padding: 0;
        }
        
        .glass-base {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 20px 0 rgba(15, 23, 42, 0.03);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .canvas-container {
            aspect-ratio: 1414 / 900;
            max-width: 1414px;
        }

        .svg-lines-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .map-point {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            z-index: 20;
            transform: translate(-50%, -50%);
            transition: opacity 0.4s ease;
            box-shadow: 0 0 8px rgba(0,0,0,0.15);
        }

        .map-label {
            position: absolute;
            text-align: center;
            z-index: 25;
            transform: translate(-50%, -50%);
            transition: opacity 0.4s ease;
            pointer-events: none;
            white-space: nowrap;
        }

        .is-filtered-out {
            opacity: 0.05 !important;
        }

        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        @media (max-width: 767px) {
            body {
                background-color: #ffffff;
            }
            
            .canvas-container {
                aspect-ratio: unset !important;
                max-width: 100% !important;
                height: 100vh;
                height: 100dvh;
                border-radius: 0 !important;
                border: none !important;
                box-shadow: none !important;
            }

            .map-wrapper-mobile {
                height: 45%;
                border-bottom: 1px solid #e2e8f0;
            }

            .desktop-only { display: none !important; }
            #central-total-card { display: none !important; }
            .map-label { display: none !important; }
            .svg-lines-layer { display: none !important; }
            
            footer {
                display: none !important;
            }

            .map-point {
                width: 16px;
                height: 16px;
                border: 2px solid #ffffff;
                box-shadow: 0 2px 6px rgba(0,0,0,0.2);
                animation: pulse-point 2s infinite;
            }

            @keyframes pulse-point {
                0% { box-shadow: 0 0 0 0 rgba(100, 116, 139, 0.4); }
                70% { box-shadow: 0 0 0 10px rgba(100, 116, 139, 0); }
                100% { box-shadow: 0 0 0 0 rgba(100, 116, 139, 0); }
            }

            .mobile-list-container {
                height: 55%;
                overflow-y: auto;
                background: #f8fafc;
                -webkit-overflow-scrolling: touch;
            }

            .mobile-list-container::-webkit-scrollbar { width: 0px; }

            .mobile-lead-card {
                transition: all 0.3s ease;
                cursor: pointer;
            }
            .mobile-lead-card:active {
                background-color: #f1f5f9;
                transform: scale(0.98);
            }
            .mobile-lead-card.is-hidden-mobile {
                display: none;
            }
        }
    </style>
</head>

            "Gávea": {x: 62, y: 78, textX: 55, textY: 75, regiao: "Zona Sul"}, "Gavea": {x: 62, y: 78, textX: 55, textY: 75, regiao: "Zona Sul"},
            "Jardim Botânico": {x: 68, y: 76, textX: 60, textY: 72, regiao: "Zona Sul"}, "Jardim Botanico": {x: 68, y: 76, textX: 60, textY: 72, regiao: "Zona Sul"},
            "Laranjeiras": {x: 77, y: 68, textX: 65, textY: 64, regiao: "Zona Sul"},
            "Botafogo": {x: 80, y: 72, textX: 90, textY: 75, regiao: "Zona Sul"},
            "Flamengo": {x: 75, y: 65, textX: 65, textY: 70, regiao: "Zona Sul"},
            "Humaitá": {x: 76, y: 72, textX: 68, textY: 78, regiao: "Zona Sul"}, "Humaita": {x: 76, y: 72, textX: 68, textY: 78, regiao: "Zona Sul"}
        };

        const colorsMap = {
            "Zona Norte": { text: "text-sky-600", dot: "bg-sky-500", border: "border-sky-400" },
            "Zona Oeste": { text: "text-emerald-600", dot: "bg-emerald-500", border: "border-emerald-400" },
            "Zona Sudoeste": { text: "text-violet-600", dot: "bg-violet-500", border: "border-violet-400" },
            "Centro": { text: "text-indigo-600", dot: "bg-indigo-500", border: "border-indigo-400" },
            "Baixada": { text: "text-amber-600", dot: "bg-amber-500", border: "border-amber-400" },
            "Zona Sul": { text: "text-rose-600", dot: "bg-rose-500", border: "border-rose-400" }
        };

        const svgStrokeColors = {
            "Zona Norte": "#38bdf8", "Zona Oeste": "#34d399", "Zona Sudoeste": "#8b5cf6", "Centro": "#818cf8", "Baixada": "#fbbf24", "Zona Sul": "#fb7185"
        };

        // ==========================================
        // LÓGICA DE FETCH, ERRO E CACHE
        // ==========================================
        function handleFetchError() {
            clearTimeout(fetchTimeout);
            const statusEl = document.getElementById('status-text');
            const mobileStatusEl = document.getElementById('mobile-status-text');
            
            if (geoDatabase.length > 0) {
                // Se já tem dados (cache), avisa modo offline
                if(statusEl) {
                    statusEl.innerText = "Modo Offline (Cache)";
                    statusEl.className = "text-xs font-semibold text-rose-500 mt-1";
                }
                if(mobileStatusEl) {
                    mobileStatusEl.innerText = "Offline";
                    mobileStatusEl.className = "text-[9px] font-medium text-rose-500 ml-1";
                }
            } else {
                // Se não tem cache, avisa erro
                if(statusEl) {
                    statusEl.innerText = "Erro ao carregar dados";
                    statusEl.className = "text-xs font-semibold text-rose-500 mt-1";
                }
                if(mobileStatusEl) {
                    mobileStatusEl.innerText = "Erro";
                    mobileStatusEl.className = "text-[9px] font-medium text-rose-500 ml-1";
                }
            }
        }

        function fetchSpreadsheetData() {
            const statusEl = document.getElementById('status-text');
            const mobileStatusEl = document.getElementById('mobile-status-text');
            if(statusEl) {
                statusEl.innerText = "Sincronizando...";
                statusEl.className = "text-xs font-semibold text-sky-500 mt-1 animate-pulse";
            }
            if(mobileStatusEl) {
                mobileStatusEl.innerText = "Sincronizando";
                mobileStatusEl.className = "text-[9px] font-medium text-sky-500 ml-1 animate-pulse";
            }

            const script = document.createElement('script');
            script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:processarRetornoPlanilha&sheet=${encodeURIComponent(SHEET_NAME)}`;
            
            script.onerror = handleFetchError;
            document.body.appendChild(script);

            // Timeout de segurança reduzido para 7 segundos para testes mais rápidos
            fetchTimeout = setTimeout(handleFetchError, 7000);
        }

        window.processarRetornoPlanilha = function(json) {
            clearTimeout(fetchTimeout);
            
            // Validação básica da resposta
            if (!json || !json.table || !json.table.rows) {
                handleFetchError();
                return;
            }

            geoDatabase = [];
            const bairroAgrupamento = {}; 
            allFunctionsList = new Set(); 
            
            const mapaBusca = Object.keys(geoDicionario).reduce((acc, bairro) => {
                acc[bairro.toLowerCase()] = bairro;
                return acc;
            }, {});

            json.table.rows.forEach(row => {
                if (!row.c || !row.c[0]) return; 
                let valorBairro = row.c[0].v;
                if (typeof valorBairro !== 'string') return; 
                
                let valorFuncao = row.c[4] && row.c[4].v ? row.c[4].v.toString().trim() : "Não definida";
                let nomeContato = row.c[1] && row.c[1].v ? row.c[1].v.toString().trim() : "Não informado";
                
                allFunctionsList.add(valorFuncao);

                let textoFormatado = valorBairro.trim().toLowerCase();
                if (!mapaBusca[textoFormatado]) return;

                let nomeRealDoBairro = mapaBusca[textoFormatado];
                
                if (!bairroAgrupamento[nomeRealDoBairro]) {
                    bairroAgrupamento[nomeRealDoBairro] = { total: 0, funcoes: {}, nomes: [] };
                }
                
                bairroAgrupamento[nomeRealDoBairro].total++;
                bairroAgrupamento[nomeRealDoBairro].funcoes[valorFuncao] = (bairroAgrupamento[nomeRealDoBairro].funcoes[valorFuncao] || 0) + 1;
                bairroAgrupamento[nomeRealDoBairro].nomes.push({ nome: nomeContato, funcao: valorFuncao });
            });

            const selectFuncoes = document.getElementById('function-filter');
            // Limpa opções antigas exceto a primeira (Todas)
            selectFuncoes.innerHTML = '<option value="all">Todas</option>';
            allFunctionsList.forEach(funcao => {
                let option = document.createElement('option');
                option.value = funcao;
                option.innerText = funcao;
                selectFuncoes.appendChild(option);
            });

            for (let bairro in bairroAgrupamento) {
                let dadosBairro = bairroAgrupamento[bairro];
                let geoInfo = geoDicionario[bairro];
                
                geoDatabase.push({
                    bairro: bairro, 
                    regiao: geoInfo.regiao, 
                    x: geoInfo.x, y: geoInfo.y,
                    textX: geoInfo.textX, textY: geoInfo.textY, 
                    totalGeral: dadosBairro.total,
                    funcoes: dadosBairro.funcoes,
                    nomes: dadosBairro.nomes
                });
            }

            // Salva no Cache (Local Storage)
            try {
                localStorage.setItem('painel_rj_cache', JSON.stringify(geoDatabase));
                localStorage.setItem('painel_rj_funcoes', JSON.stringify(Array.from(allFunctionsList)));
            } catch(e) { console.error("Erro ao salvar cache", e); }

            // Atualiza status para Sucesso (Tempo Real)
            const statusEl = document.getElementById('status-text');
            const mobileStatusEl = document.getElementById('mobile-status-text');
            if(statusEl) {
                statusEl.innerText = "Tempo Real";
                statusEl.className = "text-xs font-semibold text-emerald-500 mt-1";
            }
            if(mobileStatusEl) {
                mobileStatusEl.innerText = "Online";
                mobileStatusEl.className = "text-[9px] font-medium text-emerald-500 ml-1";
            }

            initMap();
            initMobileList(); 
            applyFilters(); 
        };

        function getCalloutPath(x1, y1, x2, y2) {
            return `M ${x1} ${y1} L ${x1} ${y2} L ${x2} ${y2}`;
        }

        function initMap() {
            const container = document.getElementById('map-bounds');
            const svgLayer = document.getElementById('svg-lines-layer');
            container.innerHTML = '';
            svgLayer.innerHTML = '';

            geoDatabase.forEach((data) => {
                const uiColor = colorsMap[data.regiao];
                const strokeColor = svgStrokeColors[data.regiao];
                const finalTextX = data.textX !== undefined ? data.textX : data.x + 4;
                const finalTextY = data.textY !== undefined ? data.textY : data.y - 8;

                const point = document.createElement('div');
                point.className = `map-point ${uiColor.dot}`;
                point.style.left = `${data.x}%`;
                point.style.top = `${data.y}%`;
                point.setAttribute('data-region', data.regiao);
                container.appendChild(point);

                const label = document.createElement('div');
                label.className = `map-label ${uiColor.text}`;
                label.style.left = `${finalTextX}%`;
                label.style.top = `${finalTextY}%`;
                label.setAttribute('data-region', data.regiao);
                container.appendChild(label);

                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', getCalloutPath(data.x, data.y, finalTextX, finalTextY));
                path.setAttribute('stroke', strokeColor);
                path.setAttribute('stroke-width', "0.25");
                path.setAttribute('fill', 'none');
                path.setAttribute('data-region', data.regiao);
                svgLayer.appendChild(path);

                data.domPoint = point;
                data.domLabel = label;
                data.domLine = path;
            });
        }

        function initMobileList() {
            const listContainer = document.getElementById('mobile-list-content');
            listContainer.innerHTML = ''; 

            geoDatabase.forEach(data => {
                const uiColor = colorsMap[data.regiao];
                const card = document.createElement('div');
                card.className = 'mobile-lead-card bg-white p-4 rounded-2xl border border-slate-100 shadow-sm';
                card.setAttribute('data-region', data.regiao);
                
                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-xl ${uiColor.dot} bg-opacity-10 flex items-center justify-center flex-shrink-0">
                            <div class="w-3 h-3 rounded-full ${uiColor.dot}"></div>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-bold text-slate-800 truncate">${data.bairro}</p>
                            <p class="text-xs text-slate-400">${data.regiao}</p>
                        </div>
                        <div class="text-right flex-shrink-0">
                            <p class="text-2xl font-extrabold ${uiColor.text} leading-none count-number">0</p>
                            <p class="text-[10px] text-slate-400 font-medium mt-1">leads</p>
                        </div>
                        <svg class="chevron-icon w-5 h-5 text-slate-300 transition-transform duration-300 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </div>
                    <div class="accordion-content w-full text-sm text-slate-600"></div>
                `;
                
                card.addEventListener('click', function() {
                    const content = this.querySelector('.accordion-content');
                    const chevron = this.querySelector('.chevron-icon');
                    if (content.style.maxHeight && content.style.maxHeight !== '0px') {
                        content.style.maxHeight = '0px';
                        chevron.classList.remove('rotate-180');
                    } else {
                        content.style.maxHeight = content.scrollHeight + 'px';
                        chevron.classList.add('rotate-180');
                    }
                });

                listContainer.appendChild(card);
                data.domMobileCard = card; 
            });
        }

        // ==========================================
        // LÓGICA UNIFICADA DE FILTROS E MODAL
        // ==========================================
        function changeRegionFilter(region) {
            currentRegionFilter = region;
            
            const buttons = document.querySelectorAll('#filter-wrapper button');
            buttons.forEach(b => b.className = "px-3 md:px-4 py-1.5 text-[11px] md:text-xs font-semibold rounded-lg md:rounded-xl bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 transition-all");
            
            const btnMap = { 'all': 'f-all', 'Zona Norte': 'f-zn', 'Zona Oeste': 'f-zo', 'Zona Sudoeste': 'f-zsd', 'Centro': 'f-cc', 'Baixada': 'f-bx', 'Zona Sul': 'f-zs' };
            const activeBtn = document.getElementById(btnMap[region]);
            if(region === 'all') activeBtn.className = "px-3 md:px-4 py-1.5 text-[11px] md:text-xs font-semibold rounded-lg md:rounded-xl bg-slate-900 text-white transition-all shadow-sm";
            else activeBtn.className = `px-3 md:px-4 py-1.5 text-[11px] md:text-xs font-semibold rounded-lg md:rounded-xl ${colorsMap[region].dot} text-white transition-all shadow-sm`;

            applyFilters();
        }

        function changeFunctionFilter(funcao) {
            currentFunctionFilter = funcao;
            applyFilters();
        }

        function toggleModalNomes() {
            const modal = document.getElementById('modal-nomes-overlay');
            const btn = document.getElementById('btn-ver-contatos');
            modal.classList.toggle('hidden');
            btn.classList.toggle('text-indigo-600');
            btn.classList.toggle('text-slate-400');
        }

        function applyFilters() {
            const centerTotalCard = document.getElementById('central-total-card');
            let totalVisivelGeral = 0;
            let modalHTML = '';

            if (currentRegionFilter === 'all') {
                centerTotalCard.classList.remove('opacity-0', 'scale-90', 'pointer-events-none');
                centerTotalCard.classList.add('scale-100', 'opacity-100');
            } else {
                centerTotalCard.classList.remove('scale-100', 'opacity-100');
                centerTotalCard.classList.add('opacity-0', 'scale-90', 'pointer-events-none');
            }

            geoDatabase.forEach(data => {
                let nomesFiltrados = (currentFunctionFilter === 'all') 
                    ? data.nomes.map(n => n.nome) 
                    : data.nomes.filter(n => n.funcao === currentFunctionFilter).map(n => n.nome);

                let quantidade = nomesFiltrados.length;
                let isRegiaoValida = (currentRegionFilter === 'all' || data.regiao === currentRegionFilter);

                if (quantidade > 0 && isRegiaoValida) {
                    totalVisivelGeral += quantidade;
                    const uiColor = colorsMap[data.regiao];

                    data.domLabel.innerHTML = `
                        <span class="text-2xl font-extrabold leading-none tracking-tight">${quantidade}</span>
                        <span class="text-[9px] font-bold uppercase tracking-wider opacity-80 block mt-0.5">${data.bairro}</span>
                    `;
                    data.domPoint.classList.remove('is-filtered-out');
                    data.domLabel.classList.remove('is-filtered-out');
                    data.domLine.style.opacity = '0.7';

                    if (data.domMobileCard) {
                        data.domMobileCard.classList.remove('is-hidden-mobile');
                        data.domMobileCard.querySelector('.count-number').innerText = quantidade;
                        
                        let nomesListaHTML = nomesFiltrados.map(n => `<p class="py-1 border-b border-slate-100 last:border-0">• ${n}</p>`).join('');
                        let contentDiv = data.domMobileCard.querySelector('.accordion-content');
                        contentDiv.innerHTML = `<div class="pt-3 mt-3 border-t border-slate-100"><div class="flex flex-col">${nomesListaHTML}</div></div>`;
                        
                        contentDiv.style.maxHeight = '0px';
                        data.domMobileCard.querySelector('.chevron-icon').classList.remove('rotate-180');
                    }

                    modalHTML += `
                        <div class="bg-white/70 p-4 rounded-xl border border-slate-200/80">
                            <h3 class="font-bold text-slate-800 mb-3 flex items-center justify-between">
                                <span>${data.bairro}</span>
                                <span class="text-xs font-medium px-2 py-0.5 rounded-full ${uiColor.dot} bg-opacity-10 ${uiColor.text}">${quantidade}</span>
                            </h3>
                            <div class="flex flex-col text-sm text-slate-600 max-h-40 overflow-y-auto pr-1">
                                ${nomesFiltrados.map(n => `<span class="py-1">• ${n}</span>`).join('')}
                            </div>
                        </div>
                    `;
                } else {
                    data.domPoint.classList.add('is-filtered-out');
                    data.domLabel.classList.add('is-filtered-out');
                    data.domLine.style.opacity = '0.05';
                    if (data.domMobileCard) {
                        data.domMobileCard.classList.add('is-hidden-mobile');
                    }
                }
            });

            document.getElementById('txt-total-count').innerText = totalVisivelGeral.toLocaleString('pt-BR');
            document.getElementById('mobile-total-count').innerText = totalVisivelGeral.toLocaleString('pt-BR');

            const modalContent = document.getElementById('modal-nomes-content');
            if (totalVisivelGeral === 0) {
                modalContent.innerHTML = `<div class="col-span-full text-center text-slate-400 py-10">Nenhum contato encontrado para os filtros selecionados.</div>`;
            } else {
                modalContent.innerHTML = modalHTML;
            }
        }

        // ==========================================
        // INICIALIZAÇÃO COM CACHE
        // ==========================================
        window.onload = () => { 
            // 1. Tenta carregar do Cache Instantaneamente
            const cachedData = localStorage.getItem('painel_rj_cache');
            const cachedFuncoes = localStorage.getItem('painel_rj_funcoes');
            
            if (cachedData && cachedFuncoes) {
                try {
                    geoDatabase = JSON.parse(cachedData);
                    allFunctionsList = new Set(JSON.parse(cachedFuncoes));
                    
                    const selectFuncoes = document.getElementById('function-filter');
                    allFunctionsList.forEach(funcao => {
                        let option = document.createElement('option');
                        option.value = funcao;
                        option.innerText = funcao;
                        selectFuncoes.appendChild(option);
                    });

                    initMap();
                    initMobileList(); 
                    applyFilters(); 
                } catch(e) {
                    console.error("Erro ao ler cache", e);
                }
            }

            // 2. Busca dados novos na nuvem (atualiza a tela se conseguir)
            fetchSpreadsheetData(); 
        };
    </script>
